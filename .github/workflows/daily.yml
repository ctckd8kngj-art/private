name: Daily Crawl

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write        # ← 이게 핵심!

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 크롤링 실행
        run: python crawler.py

      - name: 결과 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add kofia.xlsx
          git commit -m "update: $(date +'%Y-%m-%d')" || echo "변경없음"
          git push

      - name: 메일 발송
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          to: heeju.lee@meritz.co.kr
          from: ${{ secrets.GMAIL_USER }}
          subject: "KOFIA 금리 데이터 ${{ github.run_id }}"
          html_body: file://kofia.html
          attachments: kofia.xlsx
