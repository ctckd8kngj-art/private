name: Daily Crawl
on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      start_date:
        description: '시작일 (yyyy-mm-dd, 미입력시 전일)'
        required: false
      end_date:
        description: '종료일 (yyyy-mm-dd, 미입력시 전일)'
        required: false

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 이전 파일 삭제
        run: rm -f crawler/kofia.html crawler/kofia.xlsx

      - name: 라이브러리 설치
        run: pip install -r crawler/requirements.txt

      - name: 날짜 설정
        run: |
          if [ -n "${{ github.event.inputs.start_date }}" ]; then
            echo "START_DATE=${{ github.event.inputs.start_date }}" >> $GITHUB_ENV
            echo "END_DATE=${{ github.event.inputs.end_date }}" >> $GITHUB_ENV
          else
            echo "START_DATE=$(date -d 'yesterday' +'%Y-%m-%d')" >> $GITHUB_ENV
            echo "END_DATE=$(date -d 'yesterday' +'%Y-%m-%d')" >> $GITHUB_ENV
          fi

      - name: 크롤링 실행
        run: python crawler/crawler.py
        env:
          START_DATE: ${{ env.START_DATE }}
          END_DATE: ${{ env.END_DATE }}

      - name: 결과 커밋
        if: hashFiles('crawler/kofia.xlsx') != ''
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add crawler/kofia.xlsx
          git commit -m "update: ${{ env.START_DATE }} ~ ${{ env.END_DATE }}" || echo "변경없음"
          git push

      - name: 메일 발송
        if: hashFiles('crawler/kofia.html') != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.GMAIL_USER }}
          subject: "KOFIA 금리 데이터 ${{ env.START_DATE }} ~ ${{ env.END_DATE }}"
          html_body: file://crawler/kofia.html
          attachments: crawler/kofia.xlsx
