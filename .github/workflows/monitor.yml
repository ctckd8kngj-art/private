name: FSS 페이지 모니터링

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests beautifulsoup4 lxml

      - name: 모니터링 스크립트 실행
        env:
          to: ${{ secrets.MAIL_TO }}
          SMTP_HOST: "smtp.gmail.com"
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.GMAIL_USER }}
          SMTP_PASS: ${{ secrets.GMAIL_PASSWORD }}
        run: python monitor/monitor.py

      - name: 변경된 state 파일 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add monitor/state.json
          git diff --cached --quiet || git commit -m "chore: update state $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
