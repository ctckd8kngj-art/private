name: FSS 모니터링 (제목 변경 + 새 글)

on:
  schedule:
    - cron: "0 0 * * *"   # 매일 오전 09:00 KST (UTC 00:00)
    - cron: "0 6 * * *"   # 매일 오후 03:00 KST (UTC 06:00)
  workflow_dispatch:
    inputs:
      test_mode:
        description: "테스트 모드 (메일 발송까지 강제 실행, state.json 수정 없음)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install requests beautifulsoup4

      - name: 크롤링 실행
        id: check
        run: |
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            python check_title.py --test
          else
            python check_title.py
          fi

      - name: state.json 커밋 (변경 시, 테스트 모드 제외)
        if: |
          steps.check.outputs.changed == 'true' &&
          github.event.inputs.test_mode != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "chore: FSS 상태 업데이트 (state.json)"
          git push

      - name: 변경 알림 메일 발송
        if: steps.check.outputs.changed == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: "FSS 모니터 <${{ secrets.MAIL_USERNAME }}>"
          subject: "${{ github.event.inputs.test_mode == 'true' && '[테스트] FSS 알림 메일 테스트' || '[FSS 알림] 금감원 페이지 변경 감지' }}"
          body: |
            ${{ github.event.inputs.test_mode == 'true' && '🧪 테스트 메일입니다. 실제 변경이 아닙니다.\n\n' || '✅ 금융감독원 페이지에 변경이 감지되었습니다.\n\n' }}
            ${{ steps.check.outputs.mail_body }}

            ---
            GitHub Actions 자동 발송
